version: "2"

run:
  go: "1.26"
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  enable:
    # Bug detection
    - bodyclose       # HTTP response body must be closed
    - copyloopvar     # loop variable capture
    - errorlint       # error wrapping / comparison
    - nilerr          # returning nil after an error check
    # Code quality
    - gocritic        # opinionated checks
    - govet
    - misspell
    - revive
    - unconvert       # unnecessary conversions
    - unparam         # unused function params
  settings:
    revive:
      rules:
        - name: exported
          disabled: true  # doc comments are conventional, not enforced
    errcheck:
      # Terminal/table output writes: a write error to stdout/stderr or the
      # tabwriter is unactionable here (the tabwriter surfaces real errors at
      # Flush, which callers do check). Matches how fmt.Printf is ignored.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
  exclusions:
    generated: lax
    rules:
      # Tests may be longer / less strict.
      - path: _test\.go
        linters:
          - gocritic
          - unparam

formatters:
  enable:
    - gofmt
    - goimports
